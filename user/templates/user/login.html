{% extends 'main_app/base.html' %}
{% load crispy_forms_tags %}
{% block content %}

<div class="layout-narrow">
	<div class="sig-content">
		<h3 class="page-header">Login</h3>
			<form method="POST">
				{% csrf_token %}
				<fieldset class="sig-fieldset">
					<div class="crispy-form-container">
					{{ form|crispy }}
					</div>

					<div class="sig-form-actions">
					<button class="btn btn-outline-info" type="submit">Login</button>
					</div>
				</fieldset>	
				<p style="margin-top: 25px;">
				<small class="sig-required text-muted">
					*Required fields
				</small></p>
				
			</form>
			<div style="margin-top:65px; margin-bottom:55px;">
				<legend class="sig-legend header-underline">Not registered yet?</legend>
				<div style="margin-top: 25px;">
				<small class="text-muted">
				<a class="url-hover" href="{% url 'register-page' %}">Register</a>
				</small>
				</div>
			</div>
		</div>
</div>
{% endblock content %}
