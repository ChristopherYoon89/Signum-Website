<!-- templates/cookie_consent.html -->

<div id="cookie-banner" class="cookie-text" style="display:none;">

  <p style="margin-top:25px;">
    This website uses cookies to improve your experience. By continuing to use the 
    website you accept our 
    <a href="{% url 'tou-page' %}"><span class="policy-link">terms of use</span></a> and 
    <a href="{% url 'privacy-page' %}"><span class="policy-link">cookie policy</span></a>.
  </p>

  <button id="cookie-accept" class="btn btn-outline-info">Accept</button>
  <button id="cookie-reject" class="btn btn-outline-danger">Reject</button>

</div>


<script>
document.addEventListener("DOMContentLoaded", function () {

    const banner = document.getElementById("cookie-banner");

    function getCookie(name) {
        return document.cookie
            .split("; ")
            .find(row => row.startsWith(name + "="))
            ?.split("=")[1];
    }

    function setCookie(name, value, days) {
        const date = new Date();
        date.setTime(date.getTime() + (days*24*60*60*1000));
        document.cookie = name + "=" + value +
            "; expires=" + date.toUTCString() +
            "; path=/; SameSite=Lax";
    }

    const consent = getCookie("accepted_cookies");

    if (!consent) {
        banner.style.display = "block";
    }

    document.getElementById("cookie-accept").onclick = function () {
        setCookie("accepted_cookies", "true", 365);
        banner.remove();
    };

    document.getElementById("cookie-reject").onclick = function () {
        setCookie("accepted_cookies", "false", 365);
        banner.remove();
    };

});
</script>
